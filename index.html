const h = React.createElement;

// ── SCHEDULE ──
const WEEK = {

  6:{name:"Sabato",tag:"LUNGO",col:"#C4628E",study:1,blocks:[
    [7,0,7,45,"Sveglia · peso · colazione","r"],[7,45,9,45,"CORSA zona 2","ru"],
    [9,45,10,15,"Doccia + snack","x"],[10,15,13,0,"STUDIO — Mattina","s"],
    [13,0,13,30,"Pranzo","m"],[13,30,15,30,"MEAL PREP","mp"],
    [16,0,17,0,"HYBRID FLOW","g"],[17,0,21,15,"Libero","f"],
    [21,30,22,30,"Integratori · wind-down","r"]]},
  0:{name:"Domenica",tag:"PRINCIPALE",col:"#E07A5F",study:1,blocks:[

};

const PROTOCOLS = [
  {id:"blocked",e:"🧊",l:"Non parto",c:"#E07A5F",
   steps:["Alzati. 20 jumping jacks. Adesso.","Apri il laptop. Solo aprirlo.","Post-it: scrivi COSA fare in una frase.","Timer 25 min. Play.","Dopo 5 min vuoi chiudere? Chiudi. Zero colpa."],
   note:"L'80% delle volte non chiuderai. Il problema non è continuare — è partire."},
  {id:"spiral",e:"🌀",l:"Sto spiralando",c:"#9B8EC4",
   steps:["Nomina l'emozione ad alta voce.","Respira: 4 inspira — 7 tieni — 8 espira × 3.","Esci dalla situazione. Anche 5 minuti.","\"Lo sentirò così tra 3 ore?\" Probabilmente no.","NON prendere decisioni. NON mandare messaggi."],
   note:"Le emozioni ADHD sono intense ma brevi. Il volume è al massimo, ma la canzone cambia presto."},
  {id:"rsd",e:"💔",l:"Rifiuto / ferita",c:"#C4628E",
   steps:["\"Questa è RSD, non realtà.\"","Separa fatto da interpretazione.","Non reagire per 2 ore.","Se il dubbio resta: chiedi direttamente."],
   note:"Il 99% delle persone ADHD la vive. Il dolore è reale, l'interpretazione spesso no."},
  {id:"impulse",e:"🛒",l:"Voglio comprare",c:"#D4943C",
   steps:["Scrivi nella nota 'acquisti in attesa'.","Converti in ore di lavoro (€10 = 1h).","Aspetta 72 ore.","Domanda: cerco dopamina o l'oggetto?"],
   note:"Surplus: ~€217/mese. Ogni impulso mangia Bari, il portfolio, settembre."},
  {id:"sleep",e:"🌙",l:"Non dormo",c:"#6B7FA6",
   steps:["Telefono fuori dalla stanza?","20+ min svegli → alzati, altra stanza.","Body scan: dai piedi alla testa.","Pensieri? Nota vocale."],
   note:"Melatonina + Mg + Ashwagandha fatti? Se no, adesso."},
  {id:"void",e:"🕳️",l:"Tutto inutile",c:"#7A7A7A",
   steps:["Guarda i numeri, non le sensazioni.","Nomina UNA cosa fatta questa settimana.","Settembre 2026: portfolio, Bari, nuova vita.","Se persiste da giorni → psicologa."],
   note:"Sei sopravvissuto, ti sei trasferito da solo, stai studiando per cambiare vita. Non è il minimo."},
  {id:"guilt",e:"⚖️",l:"Colpa / vergogna",c:"#A0785A",
   steps:["Lo diresti a un amico? No? Allora non dirlo a te.","Non 'ho fallito' → 'il cervello non si è attivato'.","Misura settimane, non giorni.","Self-compassion > autocritica."],
   note:"26 anni senza diagnosi. Non eri difettoso."},
  {id:"lonely",e:"🏝️",l:"Mi sento solo",c:"#5B8A72",
   steps:["Manda UN messaggio. Adesso.","Esci di casa. 15 minuti.","Non li contatti = il cervello non te lo ricorda.","Pensa a UN'attività sociale strutturata."],
   note:"Reminder per contattare le persone. Le connessioni ADHD nascono dall'attività condivisa."},
];

const RULES = [
  {cat:"Avvio",col:"#E07A5F",items:["Regola 5 min: apri e basta","Post-it obiettivo specifico","Timer visivo SEMPRE","Body doubling blocchi ostici","Fatto > perfetto","Muovi il corpo prima della mente"]},
  {cat:"Tempo",col:"#6B7FA6",items:["Misura settimane, non giorni","+50% su ogni stima","Transizioni = pericolo","Max 3-4 cose/giorno","Pianifica il 60%, mai il 100%","Deadline morbide non esistono"]},
  {cat:"Focus",col:"#D4943C",items:["Proteggi l'iperfocus produttivo","Checkpoint a 2-3h","Cambiare task ≠ fallire","Pomodoro = partenza, non dogma","Mai silenzio totale","Studia attivamente"]},
  {cat:"Emozioni",col:"#9B8EC4",items:["Mai decisioni in picco emotivo","RSD = neurobiologia","La vergogna mente","Ruminazione? Esternalizza","Self-compassion > autocritica","STOP → respira → esci"]},
  {cat:"Soldi",col:"#D4943C",items:["72h ogni acquisto > €15","Prezzo → ore di lavoro","Review SOLO il 15","Automatizza tutto","€20-30/mese fondo piacere","Non portare più del necessario"]},
  {cat:"Corpo",col:"#3D9B8F",items:["Palestra = farmaco","Studia DOPO esercizio","Pasti = appuntamenti","Snack emergenza sempre","Tel. fuori camera 21:30","Normocalorica fino a giugno"]},
  {cat:"Relazioni",col:"#C4628E",items:["Reminder per contattare","Iperfocus ≠ amore","Non interrompere: scrivi","ADHD spiega, non giustifica","Chiedi, non interpretare","Attività condivise > vediamoci"]},
  {cat:"Sistemi",col:"#5B8A72",items:["Ogni sistema muore in 4-6 sett","Ruota 4-5 strumenti","Se non lo vedi, non esiste","Ogni oggetto ha una casa","10 min > 'pulisci la casa'","Il sistema che usi > il perfetto"]},
];

// ── HELPERS ──
const pad=n=>String(n).padStart(2,'0');
const DAYS=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const MO=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const tk=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
const wk=()=>{const d=new Date(),o=new Date(d.getFullYear(),0,1);return`${d.getFullYear()}-W${Math.ceil(((d-o)/864e5+o.getDay()+1)/7)}`};
const tM=(a,b)=>a*60+b;
const LVLS=[0,100,250,500,900,1400,2100,3100,4500,6500,9000,12500,17000,23000,30000];
const LN=["Recruit","Initiate","Runner","Scholar","Warrior","Hacker","Architect","Commander","Sage","Legend","Titan","Phantom","Apex","Omega","∞"];
const gL=xp=>{for(let i=LVLS.length-1;i>=0;i--)if(xp>=LVLS[i])return i;return 0};

const LS_KEY='centro-pwa-v1';
const load=()=>{try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):null}catch{return null}};
const save=d=>{try{localStorage.setItem(LS_KEY,JSON.stringify(d))}catch(e){console.error(e)}};
const DEF={totalXp:0,streak:0,lastDate:null,done:{},doneH:{},wStudy:{},purchases:[]};

// ── APP ──
function Centro(){
  const[tab,sTab]=useState("now");
  const[data,sData]=useState(DEF);
  const[rdy,sRdy]=useState(false);
  const[now,sNow]=useState(new Date());
  const[tmr,sTmr]=useState(25*60);
  const[tmrOn,sTmrOn]=useState(false);
  const[tmrM,sTmrM]=useState("f");
  const[pom,sPom]=useState(0);
  const[oP,sOP]=useState(null);
  const[oR,sOR]=useState(null);
  const[xpP,sXpP]=useState(null);
  const[pTxt,sPTxt]=useState("");
  const[pCst,sPCst]=useState("");
  const[br,sBr]=useState(false);
  const[brP,sBrP]=useState("inspira");
  const[brC,sBrC]=useState(4);
  const[brCy,sBrCy]=useState(0);
  const tRef=useRef(null);
  const bRef=useRef(null);

  const day=WEEK[now.getDay()];
  const nM=tM(now.getHours(),now.getMinutes());

  useEffect(()=>{const i=setInterval(()=>sNow(new Date()),30000);return()=>clearInterval(i)},[]);
  
  useEffect(()=>{
    const s=load();
    if(s){const t=tk();if(s.lastDate!==t){const y=new Date();y.setDate(y.getDate()-1);
      const yk=`${y.getFullYear()}-${pad(y.getMonth()+1)}-${pad(y.getDate())}`;
      s.streak=s.doneH?.[yk]?s.streak+1:0;s.done={};s.lastDate=t;}sData(s);}
    else sData({...DEF,lastDate:tk()});sRdy(true);
  },[]);

  useEffect(()=>{if(rdy)save(data)},[data,rdy]);

  useEffect(()=>{
    if(tmrOn&&tmr>0){tRef.current=setInterval(()=>sTmr(t=>t-1),1000)}
    else if(tmr===0&&tmrOn){sTmrOn(false);
      if(tmrM==="f"){sPom(p=>p+1);sTmrM("b");sTmr(5*60)}else{sTmrM("f");sTmr(25*60)}}
    return()=>clearInterval(tRef.current);
  },[tmrOn,tmr]);

  useEffect(()=>{if(!br)return;let e=0;
    bRef.current=setInterval(()=>{e++;
      if(e<=4){sBrP("inspira");sBrC(5-e)}else if(e<=11){sBrP("tieni");sBrC(12-e)}
      else if(e<=19){sBrP("espira");sBrC(20-e)}else{e=0;sBrCy(c=>c+1)}},1000);
    return()=>clearInterval(bRef.current)},[br]);

  const tog=useCallback((i,b)=>{
    const k=`${now.getDay()}-${i}`;
    sData(p=>{const d={...p.done};const t=tk();const w=wk();const ws={...p.wStudy};let xd=0;
      const xm={s:40,g:35,ru:40,mp:25,r:8,m:10,so:30};const bx=xm[b[5]]||0;
      const sm=b[5]==='s'?tM(b[2],b[3])-tM(b[0],b[1]):b[5]==='so'?75:0;
      if(d[k]){delete d[k];xd=-bx;ws[w]=Math.max(0,(ws[w]||0)-sm)}
      else{d[k]=true;xd=bx;ws[w]=(ws[w]||0)+sm;if(xd>0){sXpP(xd);setTimeout(()=>sXpP(null),1000)}}
      const dh={...p.doneH};dh[t]=true;
      return{...p,totalXp:Math.max(0,p.totalXp+xd),done:d,doneH:dh,wStudy:ws}})
  },[now]);

  const addP=()=>{if(!pTxt.trim())return;
    sData(p=>({...p,purchases:[...(p.purchases||[]),{id:Date.now(),item:pTxt.trim(),
      cost:pCst?parseFloat(pCst):null,at:new Date().toISOString(),exp:new Date(Date.now()+72*36e5).toISOString()}]}));
    sPTxt("");sPCst("")};
  
  if(!rdy)return h('div',{style:{background:'#0A0A0C',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},
    h('div',{style:{width:8,height:8,borderRadius:'50%',background:'#E07A5F',animation:'pulse 1s infinite'}}));

  const lvl=gL(data.totalXp);const nxt=lvl<LVLS.length-1?LVLS[lvl+1]:data.totalXp;const prv=LVLS[lvl];
  const xpPr=nxt>prv?(data.totalXp-prv)/(nxt-prv):1;
  const wSH=((data.wStudy?.[wk()]||0)/60).toFixed(1);
  const cB=day.blocks.find(b=>nM>=tM(b[0],b[1])&&nM<tM(b[2],b[3]));
  const nB=day.blocks.find(b=>tM(b[0],b[1])>nM);
  const dC=day.blocks.filter((_,i)=>data.done[`${now.getDay()}-${i}`]).length;
  const aC=day.blocks.filter(b=>['s','g','ru','mp','r','m','so'].includes(b[5])).length;
  const ci=2*Math.PI*44;
  const tC=t=>t==='s'||t==='so'?'#E07A5F':t==='g'||t==='ru'?'#3D9B8F':t==='mp'?'#C4628E':t==='f'?'#9B8EC4':t==='m'?'#D4943C':t==='r'?'#6B7FA6':'#444';

  // ── RENDER ──
  return h('div',{style:{background:'#0A0A0C',minHeight:'100vh',maxWidth:430,margin:'0 auto',
    fontFamily:"-apple-system,'Segoe UI',sans-serif",color:'#D8D4CD',position:'relative',
    paddingTop:'env(safe-area-inset-top)',paddingBottom:'env(safe-area-inset-bottom)'}},

    // XP popup
    xpP&&h('div',{style:{position:'fixed',top:70,left:'50%',transform:'translateX(-50%)',
      background:'#E07A5F',color:'#fff',fontWeight:700,fontSize:16,padding:'6px 18px',
      borderRadius:16,zIndex:100,fontFamily:'monospace',animation:'fadeUp 1s ease-out forwards'}},'+'+xpP+' XP'),

    // Breathing overlay
    br&&h('div',{style:{position:'fixed',inset:0,background:'#0A0A0CF0',zIndex:100,
      display:'flex',alignItems:'center',justifyContent:'center'},
      onClick:()=>{sBr(false);sBrCy(0)}},
      h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:16},onClick:e=>e.stopPropagation()},
        h('div',{style:{fontSize:12,letterSpacing:4,color:'#6B6760'}},brP.toUpperCase()),
        h('div',{style:{width:140,height:140,borderRadius:'50%',border:'2px solid '+(brP==='inspira'?'#E07A5F':brP==='tieni'?'#D4943C':'#3D9B8F'),
          display:'flex',alignItems:'center',justifyContent:'center',
          transform:'scale('+(brP==='inspira'?1.3:brP==='tieni'?1.3:0.8)+')',
          transition:'all 1.5s cubic-bezier(0.4,0,0.2,1)'}},
          h('span',{style:{fontSize:40,fontWeight:300,color:'#E8E4DD'}},brC)),
        h('div',{style:{fontSize:12,color:'#6B6760'}},brCy+'/3 cicli'),
        h('div',{style:{fontSize:10,color:'#3A3835'}},'tap fuori per chiudere'))),

    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'18px 20px 0'}},
      h('div',null,
        h('div',{style:{fontSize:20,fontWeight:600,color:'#E8E4DD'}},day.name),
        h('div',{style:{fontSize:11,color:'#6B6760',marginTop:2}},now.getDate()+' '+MO[now.getMonth()]+' · ',
          h('span',{style:{color:day.col}},day.tag))),
      h('div',{style:{textAlign:'right'}},
        h('div',{style:{fontSize:22,fontWeight:300,fontFamily:'monospace',color:'#E8E4DD'}},pad(now.getHours())+':'+pad(now.getMinutes())),
        h('div',{style:{fontSize:12,color:'#6B6760',marginTop:2}},'🔥 '+data.streak))),

    // XP bar
    h('div',{style:{padding:'10px 20px 6px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
        h('span',{style:{fontSize:10,color:'#6B6760'}},'LV.'+lvl+' '+LN[lvl]),
        h('span',{style:{fontSize:10,color:'#4A4540',fontFamily:'monospace'}},data.totalXp+' XP')),
      h('div',{style:{height:4,background:'#1A1A1F',borderRadius:2,overflow:'hidden'}},
        h('div',{style:{height:'100%',background:'linear-gradient(90deg,#E07A5F,#D4943C)',borderRadius:2,
          width:xpPr*100+'%',transition:'width 0.6s ease'}}))),

    // Content
    h('div',{style:{flex:1,padding:'10px 20px 90px',overflowY:'auto'}},

      // TAB: NOW
      tab==="now"&&h('div',null,
        cB&&h('div',{style:{padding:'12px 14px',borderRadius:12,background:'#111015',borderLeft:'3px solid '+tC(cB[5]),marginBottom:14}},
          h('div',{style:{fontSize:10,color:tC(cB[5]),fontWeight:600,letterSpacing:1,marginBottom:4}},'ADESSO'),
          h('div',{style:{fontSize:16,fontWeight:600,color:'#E8E4DD'}},cB[4]),
          h('div',{style:{fontSize:11,color:'#6B6760',marginTop:3}},'fino alle '+pad(cB[2])+':'+pad(cB[3])+(nB?' · poi: '+nB[4]:''))),
        
        h('div',{style:{display:'flex',gap:6,marginBottom:16}},
          ...[{v:dC+'/'+aC,l:'oggi'},{v:wSH+'h',l:'studio sett.'},{v:pom,l:'🍅 oggi'}].map((s,i)=>
            h('div',{key:i,style:{flex:1,background:'#111015',borderRadius:10,padding:'8px',textAlign:'center'}},
              h('div',{style:{fontSize:18,fontWeight:600,fontFamily:'monospace',color:'#E8E4DD'}},s.v),
              h('div',{style:{fontSize:10,color:'#6B6760',marginTop:2}},s.l)))),

        h('div',{style:{marginBottom:20}},
          ...day.blocks.map((b,i)=>{
            const k=`${now.getDay()}-${i}`;const dn=!!data.done[k];const iC=cB===b;
            const tc=tC(b[5]);const tp=['s','g','ru','mp','r','m','so'].includes(b[5]);const iS=b[5]==='s';
            return h('div',{key:i,style:{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'9px 10px',borderLeft:'2px solid '+tc,borderRadius:6,marginBottom:2,cursor:tp?'pointer':'default',
              opacity:dn?.45:1,background:iC?tc+'0A':'transparent'},onClick:()=>tp&&tog(i,b)},
              h('div',{style:{display:'flex',alignItems:'center',gap:10,flex:1}},
                tp?h('div',{style:{width:18,height:18,borderRadius:5,border:'1.5px solid '+(dn?tc:'#333'),
                  background:dn?tc:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
                  dn&&h('span',{style:{color:'#fff',fontSize:10,fontWeight:700}},'✓')):h('div',{style:{width:18}}),
                h('div',{style:{flex:1}},
                  h('div',{style:{fontSize:10,color:tc,fontFamily:'monospace'}},pad(b[0])+':'+pad(b[1])),
                  h('div',{style:{fontSize:13,fontWeight:b[5]==='w'||b[5]==='x'?400:500,
                    color:b[5]==='w'?'#555':b[5]==='f'?'#9B8EC4':dn?'#666':'#D8D4CD',
                    textDecoration:dn?'line-through':'none',fontStyle:b[5]==='so'?'italic':'normal'}},b[4]))),
              iS&&!dn&&h('div',{style:{width:26,height:26,borderRadius:'50%',border:'1.5px solid '+tc,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:tc,cursor:'pointer'},
                onClick:e=>{e.stopPropagation();sTab("timer")}},'▶'))})),

        day.study&&h('div',{style:{display:'flex',gap:8,padding:'10px 12px',borderRadius:10,
