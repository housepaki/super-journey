<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#09090B">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Centro</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{margin:0;padding:0;background:#09090B;height:100%;font-family:-apple-system,'Segoe UI',Helvetica,sans-serif;overflow:hidden}
#root{height:100%}
input,textarea{-webkit-user-select:text;user-select:text}
@keyframes fadeUp{from{opacity:1;transform:translateX(-50%) translateY(0)}to{opacity:0;transform:translateX(-50%) translateY(-30px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const{useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;
const pad=n=>String(n).padStart(2,'0');
const MO=["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];
const DN=["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
const tk=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};
const wk=()=>{const d=new Date(),o=new Date(d.getFullYear(),0,1);return`${d.getFullYear()}-W${Math.ceil(((d-o)/864e5+o.getDay()+1)/7)}`};
const tM=(a,b)=>a*60+b;

// ── SCHEDULE ──
const WEEK={
1:{n:"Lunedì",tag:"RICARICA",c:"#3D9B8F",st:0,b:[[6,0,7,0,"Sveglia · peso · colazione","r"],[7,0,13,0,"Lavoro","w"],[13,0,13,20,"Pranzo","m"],[13,30,14,45,"PALESTRA Full Body","g"],[14,45,15,20,"Doccia · transizione","x"],[15,30,18,30,"Lavoro","w"],[19,0,19,30,"Cena","m"],[19,30,21,15,"Libero — recovery","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
2:{n:"Martedì",tag:"STUDIO",c:"#E07A5F",st:1,b:[[6,0,7,0,"Sveglia · peso · colazione","r"],[7,0,13,0,"Lavoro","w"],[13,0,13,15,"Pranzo veloce","m"],[13,15,15,10,"STUDIO — Blocco A","s"],[15,30,18,30,"Lavoro","w"],[19,0,19,30,"Cena","m"],[19,30,21,15,"Studio B (opzionale)","so"],[21,30,22,30,"Integratori · wind-down","r"]]},
3:{n:"Mercoledì",tag:"RICARICA",c:"#3D9B8F",st:0,b:[[6,0,7,0,"Sveglia · peso · colazione","r"],[7,0,13,0,"Lavoro","w"],[13,0,13,20,"Pranzo","m"],[13,30,14,45,"PALESTRA Full Body","g"],[14,45,15,20,"Doccia · transizione","x"],[15,30,18,30,"Lavoro","w"],[19,0,19,30,"Cena","m"],[19,30,21,15,"Libero — recovery","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
4:{n:"Giovedì",tag:"BUFFER",c:"#9B8EC4",st:0,b:[[6,0,7,0,"Sveglia · peso · colazione","r"],[7,0,13,0,"Lavoro","w"],[13,0,15,30,"LIBERO TOTALE","f"],[15,30,18,30,"Lavoro","w"],[19,0,19,30,"Cena","m"],[19,30,22,0,"Serata libera","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
5:{n:"Venerdì",tag:"POWER",c:"#D4943C",st:1,b:[[5,45,6,30,"Sveglia · peso · colazione","r"],[7,0,15,0,"Lavoro","w"],[15,20,16,30,"PALESTRA Full Body","g"],[16,30,17,0,"Doccia + skyr e noci","m"],[17,0,19,15,"STUDIO — Power Block","s"],[19,30,20,0,"Cena","m"],[20,0,21,15,"Libero","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
6:{n:"Sabato",tag:"LUNGO",c:"#C4628E",st:1,b:[[7,0,7,45,"Sveglia · peso · colazione","r"],[7,45,9,45,"CORSA zona 2","ru"],[9,45,10,15,"Doccia + snack","x"],[10,15,13,0,"STUDIO — Mattina","s"],[13,0,13,30,"Pranzo","m"],[13,30,15,30,"MEAL PREP","mp"],[16,0,17,0,"HYBRID FLOW","g"],[17,0,21,15,"Libero","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
0:{n:"Domenica",tag:"PRINCIPALE",c:"#E07A5F",st:1,b:[[8,0,8,30,"Sveglia · peso · colazione","r"],[8,30,13,0,"STUDIO — Mattina","s"],[13,0,14,0,"Pranzo + pausa vera","m"],[14,0,16,0,"STUDIO — Pomeriggio","s"],[16,0,21,15,"Pomeriggio libero","f"],[21,30,22,30,"Integratori · wind-down","r"]]},
};

const PROTOS=[
{id:"blocked",e:"🧊",l:"Non parto",c:"#E07A5F",s:["Alzati. 20 jumping jacks.","Apri il laptop. Solo aprirlo.","Post-it: COSA fare. Un verbo.","Timer 25 min. Play.","5 min e vuoi chiudere? Chiudi."],n:"L'80% delle volte non chiuderai."},
{id:"spiral",e:"🌀",l:"Spirale emotiva",c:"#9B8EC4",s:["Nomina l'emozione ad alta voce.","Respira: 4-7-8 × 3 cicli.","Esci dalla situazione. 5 min.","\"Tra 3 ore sarà uguale?\" No.","NON decidere. NON scrivere."],n:"Intense ma brevi. Aspetta."},
{id:"rsd",e:"💔",l:"Rifiuto / ferita",c:"#C4628E",s:["\"Questa è RSD, non realtà.\"","Fatto ≠ interpretazione.","Non reagire per 2 ore.","Dubbio? Chiedi direttamente."],n:"Il dolore è reale, l'interpretazione spesso no."},
{id:"impulse",e:"🛒",l:"Voglio comprare",c:"#D4943C",s:["Scrivi in 'acquisti in attesa'.","€ → ore di lavoro.","Aspetta 72h.","Cerco dopamina o l'oggetto?"],n:"Ogni impulso mangia il futuro."},
{id:"sleep",e:"🌙",l:"Non dormo",c:"#6B7FA6",s:["Tel. fuori stanza?","20+ min → alzati, altra stanza.","Body scan piedi→testa.","Pensieri → nota vocale."],n:"Integratori fatti? Se no, adesso."},
{id:"void",e:"🕳️",l:"Tutto inutile",c:"#7A7A7A",s:["Numeri, non sensazioni.","UNA cosa fatta questa settimana.","Guarda il tuo obiettivo più grande.","Persiste giorni → psicologa."],n:"Sei ancora in piedi. Non è il minimo."},
{id:"guilt",e:"⚖️",l:"Colpa",c:"#A0785A",s:["Lo diresti a un amico? No.","Non 'ho fallito' → 'non si è attivato'.","Settimane, non giorni.","Self-compassion > autocritica."],n:"Non eri difettoso. Eri un cervello diverso."},
{id:"lonely",e:"🏝️",l:"Solo",c:"#5B8A72",s:["UN messaggio. Adesso.","Esci. 15 minuti.","Il cervello non te lo ricorda.","Attività sociale strutturata."],n:"Reminder per contattare le persone."},
];

const RULES=[
{t:"Avvio",c:"#E07A5F",r:["Regola 5 min: apri e basta","Post-it obiettivo specifico","Timer visivo SEMPRE","Body doubling blocchi ostici","Fatto > perfetto","Corpo prima della mente"]},
{t:"Tempo",c:"#6B7FA6",r:["Settimane, non giorni","+50% ogni stima","Transizioni = pericolo","Max 3-4 cose/giorno","60% pianificato, 40% vuoto","Deadline morbide non esistono"]},
{t:"Focus",c:"#D4943C",r:["Proteggi iperfocus produttivo","Checkpoint 2-3h","Cambiare task ≠ fallire","Pomodoro = partenza","Mai silenzio totale","Studia attivamente"]},
{t:"Emozioni",c:"#9B8EC4",r:["Mai decisioni in picco emotivo","RSD = neurobiologia","La vergogna mente","Ruminazione → esternalizza","Self-compassion > autocritica","STOP → respira → esci"]},
{t:"Soldi",c:"#D4943C",r:["72h acquisti > €15","€ → ore di lavoro","Review SOLO il 15","Automatizza tutto","€20-30/mese piacere","Non portare troppo cash"]},
{t:"Corpo",c:"#3D9B8F",r:["Palestra = farmaco","Studia DOPO esercizio","Pasti = appuntamenti","Snack emergenza","Tel. fuori 21:30","Normocalorica fino a review"]},
{t:"Relazioni",c:"#C4628E",r:["Reminder contattare","Iperfocus ≠ amore","Scrivi, non interrompere","ADHD spiega ≠ giustifica","Chiedi, non interpretare","Attività condivise > vediamoci"]},
{t:"Sistemi",c:"#5B8A72",r:["Ogni sistema muore 4-6 sett","Ruota strumenti","Se non lo vedi non esiste","Ogni oggetto ha una casa","10 min > 'pulisci la casa'","Usa > perfetto"]},
];

const SUPPLEMENTS=["Melatonina 1mg","Magnesio 300mg","Ashwagandha 600mg","L-teanina"];
const MEALS=["Colazione","Pranzo","Snack","Cena"];

const GROCERY_CATS=[
{id:"prot",n:"🥩 Proteine",c:"#E07A5F"},
{id:"carb",n:"🌾 Carboidrati",c:"#D4943C"},
{id:"veg",n:"🥬 Verdura/Frutta",c:"#3D9B8F"},
{id:"dairy",n:"🥛 Latticini",c:"#6B7FA6"},
{id:"other",n:"📦 Altro",c:"#9B8EC4"},
];

const MANTRAS=["Non è forza di volontà. È design dell'ambiente.","Fatto batte perfetto.","L'irregolarità è il tuo funzionamento.","Misura settimane, non giorni.","Ogni sistema muore. Pianifica la rotazione.","Se non lo vedi, non esiste.","La vergogna paralizza. La compassione attiva.","Il blocco è sul task, non su di te."];

const LVLS=[0,100,250,500,900,1400,2100,3100,4500,6500,9000,12500,17000,23000,30000];
const LN=["Recruit","Initiate","Runner","Scholar","Warrior","Hacker","Architect","Commander","Sage","Legend","Titan","Phantom","Apex","Omega","∞"];
const gL=xp=>{for(let i=LVLS.length-1;i>=0;i--)if(xp>=LVLS[i])return i;return 0};

const LS='centro-v4';
const load=()=>{try{const s=localStorage.getItem(LS);return s?JSON.parse(s):null}catch{return null}};
const save=d=>{try{localStorage.setItem(LS,JSON.stringify(d))}catch(e){console.error(e)}};

const DEF={xp:0,streak:0,lastDate:null,done:{},doneH:{},wStudy:{},studyTotal:0,
purchases:[],moods:{},meals:{},supps:{},
runs:[],runGoal:{label:"",target:null},
grocery:{items:[],templates:[]},
contacts:[],psyNotes:[],
};

const tC=t=>t==='s'||t==='so'?'#E07A5F':t==='g'||t==='ru'?'#3D9B8F':t==='mp'?'#C4628E':t==='f'?'#9B8EC4':t==='m'?'#D4943C':t==='r'?'#6B7FA6':'#333';

function App(){
const[tab,sTab]=useState("now");
const[sub,sSub]=useState(null);
const[D,sD]=useState(DEF);
const[rdy,sRdy]=useState(false);
const[now,sNow]=useState(new Date());
const[tmr,sTmr]=useState(25*60);
const[tmrOn,sTmrOn]=useState(false);
const[tmrM,sTmrM]=useState("f");
const[pom,sPom]=useState(0);
const[xpP,sXpP]=useState(null);
const[br,sBr]=useState(false);
const[brP,sBrP]=useState("inspira");
const[brC,sBrC]=useState(4);
const[brCy,sBrCy]=useState(0);
const[iPT,sIPT]=useState("");
const[iPC,sIPC]=useState("");
const[iPsy,sIPsy]=useState("");
const[iCon,sICon]=useState("");
const[iGro,sIGro]=useState("");
const[iGroCat,sIGroCat]=useState("prot");
const[iRD,sIRD]=useState("");
const[iRP,sIRP]=useState("");
const[iRN,sIRN]=useState("");
const[iRG,sIRG]=useState("");
const tRef=useRef(null);const bRef=useRef(null);

const day=WEEK[now.getDay()];
const nM=tM(now.getHours(),now.getMinutes());
const today=tk();const week=wk();
const mantra=MANTRAS[now.getDate()%MANTRAS.length];

useEffect(()=>{const i=setInterval(()=>sNow(new Date()),30000);return()=>clearInterval(i)},[]);

useEffect(()=>{
const s=load();
if(s){if(s.lastDate!==today){const y=new Date();y.setDate(y.getDate()-1);
const yk=`${y.getFullYear()}-${pad(y.getMonth()+1)}-${pad(y.getDate())}`;
s.streak=s.doneH?.[yk]?s.streak+1:0;s.done={};s.lastDate=today;}sD(s);}
else sD({...DEF,lastDate:today});sRdy(true);
},[]);

useEffect(()=>{if(rdy)save(D)},[D,rdy]);

useEffect(()=>{
if(tmrOn&&tmr>0)tRef.current=setInterval(()=>sTmr(t=>t-1),1000);
else if(tmr===0&&tmrOn){sTmrOn(false);
if(tmrM==="f"){sPom(p=>p+1);sTmrM("b");sTmr(5*60)}else{sTmrM("f");sTmr(25*60)}
try{navigator.vibrate?.(300)}catch{}}
return()=>clearInterval(tRef.current);
},[tmrOn,tmr]);

useEffect(()=>{if(!br)return;let e=0;
bRef.current=setInterval(()=>{e++;
if(e<=4){sBrP("inspira");sBrC(5-e)}else if(e<=11){sBrP("tieni");sBrC(12-e)}
else if(e<=19){sBrP("espira");sBrC(20-e)}else{e=0;sBrCy(c=>c+1)}},1000);
return()=>clearInterval(bRef.current)},[br]);

const up=useCallback(fn=>sD(p=>fn(p)),[]);
const xpBump=(v)=>{sXpP(v);setTimeout(()=>sXpP(null),1000)};

const tog=useCallback((i,b)=>{
const k=`${now.getDay()}-${i}`;
up(p=>{const d={...p.done};const ws={...p.wStudy};let xd=0;
const xm={s:40,g:35,ru:40,mp:25,r:8,m:10,so:30};const bx=xm[b[5]]||0;
const sm=b[5]==='s'?tM(b[2],b[3])-tM(b[0],b[1]):b[5]==='so'?75:0;
if(d[k]){delete d[k];xd=-bx;ws[week]=Math.max(0,(ws[week]||0)-sm)}
else{d[k]=true;xd=bx;ws[week]=(ws[week]||0)+sm;if(xd>0)xpBump(xd)}
const dh={...p.doneH};dh[today]=true;
return{...p,xp:Math.max(0,p.xp+xd),done:d,doneH:dh,wStudy:ws}});
},[now,today,week]);

const logMeal=i=>up(p=>{const m={...p.meals};const t=m[today]||[];m[today]=t.includes(i)?t.filter(x=>x!==i):[...t,i];return{...p,meals:m}});
const logSupp=i=>up(p=>{const s={...p.supps};const t=s[today]||[];s[today]=t.includes(i)?t.filter(x=>x!==i):[...t,i];return{...p,supps:s}});
const logMood=v=>up(p=>({...p,moods:{...p.moods,[today]:v}}));

// Running
const addRun=()=>{if(!iRD)return;up(p=>({...p,runs:[...(p.runs||[]),{id:Date.now(),date:today,dist:parseFloat(iRD),pace:iRP||null,note:iRN||null}]}));sIRD("");sIRP("");sIRN("");xpBump(35)};
const setRunGoal=()=>{if(!iRG)return;up(p=>({...p,runGoal:{label:iRG,target:null}}));sIRG("")};
const totalKm=(D.runs||[]).reduce((s,r)=>s+r.dist,0);
const lastRun=(D.runs||[]).sort((a,b)=>b.id-a.id)[0];
const monthRuns=(D.runs||[]).filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()});
const monthKm=monthRuns.reduce((s,r)=>s+r.dist,0);

// Grocery
const addGrocery=()=>{if(!iGro.trim())return;up(p=>{const g={...p.grocery};g.items=[...(g.items||[]),{id:Date.now(),name:iGro.trim(),cat:iGroCat,bought:false}];return{...p,grocery:g}});sIGro("")};
const togGrocery=id=>up(p=>{const g={...p.grocery};g.items=(g.items||[]).map(x=>x.id===id?{...x,bought:!x.bought}:x);return{...p,grocery:g}});
const delGrocery=id=>up(p=>{const g={...p.grocery};g.items=(g.items||[]).filter(x=>x.id!==id);return{...p,grocery:g}});
const clearBought=()=>up(p=>{const g={...p.grocery};g.items=(g.items||[]).filter(x=>!x.bought);return{...p,grocery:g}});
const saveTemplate=()=>{const active=(D.grocery?.items||[]).filter(x=>!x.bought);if(!active.length)return;
const name=`Lista ${now.getDate()} ${MO[now.getMonth()]}`;
up(p=>{const g={...p.grocery};g.templates=[...(g.templates||[]),{id:Date.now(),name,items:active.map(x=>({name:x.name,cat:x.cat}))}];return{...p,grocery:g}})};
const loadTemplate=t=>{up(p=>{const g={...p.grocery};const newItems=t.items.map(x=>({id:Date.now()+Math.random()*1000,name:x.name,cat:x.cat,bought:false}));g.items=[...(g.items||[]),...newItems];return{...p,grocery:g}})};

// Purchases
const addPurchase=()=>{if(!iPT.trim())return;up(p=>({...p,purchases:[...(p.purchases||[]),{id:Date.now(),item:iPT.trim(),cost:iPC?parseFloat(iPC):null,exp:new Date(Date.now()+72*36e5).toISOString()}]}));sIPT("");sIPC("")};

// Study
const addStudy=m=>up(p=>({...p,studyTotal:p.studyTotal+m}));

// Psy
const addPsy=()=>{if(!iPsy.trim())return;up(p=>({...p,psyNotes:[...(p.psyNotes||[]),{id:Date.now(),text:iPsy.trim(),date:today}]}));sIPsy("")};

// Contacts
const addCon=()=>{if(!iCon.trim())return;up(p=>({...p,contacts:[...(p.contacts||[]),{id:Date.now(),name:iCon.trim(),last:null}]}));sICon("")};
const touchCon=id=>up(p=>({...p,contacts:(p.contacts||[]).map(c=>c.id===id?{...c,last:today}:c)}));

if(!rdy)return h('div',{style:{background:'#09090B',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}},h('div',{style:{width:8,height:8,borderRadius:'50%',background:'#E07A5F',animation:'pulse 1s infinite'}}));

const lvl=gL(D.xp);const nxt=lvl<LVLS.length-1?LVLS[lvl+1]:D.xp;const prv=LVLS[lvl];
const xpPr=nxt>prv?(D.xp-prv)/(nxt-prv):1;
const wSH=((D.wStudy?.[week]||0)/60).toFixed(1);
const cB=day.b.find(b=>nM>=tM(b[0],b[1])&&nM<tM(b[2],b[3]));
const nB=day.b.find(b=>tM(b[0],b[1])>nM);
const dC=day.b.filter((_,i)=>D.done[`${now.getDay()}-${i}`]).length;
const aC=day.b.filter(b=>['s','g','ru','mp','r','m','so'].includes(b[5])).length;
const ci=2*Math.PI*44;
const todayMeals=D.meals?.[today]||[];const todaySupps=D.supps?.[today]||[];const todayMood=D.moods?.[today];
const is15=now.getDate()===15;
const groceryItems=D.grocery?.items||[];
const groceryBought=groceryItems.filter(x=>x.bought).length;
const groceryTotal=groceryItems.length;

const go=(t,s=null)=>{sTab(t);sSub(s)};

return h('div',{style:Z.app},
xpP&&h('div',{style:Z.xpP},'+'+xpP+' XP'),

// Breathing
br&&h('div',{style:Z.ov,onClick:()=>{sBr(false);sBrCy(0)}},
h('div',{onClick:e=>e.stopPropagation(),style:{display:'flex',flexDirection:'column',alignItems:'center',gap:16}},
h('div',{style:{fontSize:12,letterSpacing:4,color:'#6B6760',fontFamily:'monospace'}},brP.toUpperCase()),
h('div',{style:{width:140,height:140,borderRadius:'50%',border:'2px solid '+(brP==='inspira'?'#E07A5F':brP==='tieni'?'#D4943C':'#3D9B8F'),display:'flex',alignItems:'center',justifyContent:'center',transform:'scale('+(brP==='tieni'||brP==='inspira'?1.3:0.8)+')',transition:'all 1.5s cubic-bezier(0.4,0,0.2,1)'}},
h('span',{style:{fontSize:40,fontWeight:300,color:'#E8E4DD'}},brC)),
h('div',{style:{fontSize:12,color:'#6B6760'}},brCy+'/3 cicli'))),

// HEADER
h('div',{style:Z.hd},
h('div',null,h('div',{style:Z.hdN},day.n),h('div',{style:Z.hdD},now.getDate()+' '+MO[now.getMonth()]+' · ',h('span',{style:{color:day.c}},day.tag))),
h('div',{style:{textAlign:'right'}},h('div',{style:Z.hdT},pad(now.getHours())+':'+pad(now.getMinutes())),h('div',{style:{fontSize:11,color:'#555'}},'🔥'+D.streak+' · LV'+lvl))),

h('div',{style:{padding:'4px 18px 6px'}},h('div',{style:Z.xpTr},h('div',{style:{...Z.xpFl,width:xpPr*100+'%'}}))),

// CONTENT
h('div',{style:Z.ct},

// ═══ NOW ═══
tab==="now"&&h('div',null,
cB&&h('div',{style:{...Z.cur,borderLeftColor:tC(cB[5])}},
h('div',{style:{fontSize:9,color:tC(cB[5]),fontWeight:700,letterSpacing:1.5}},'ADESSO'),
h('div',{style:{fontSize:15,fontWeight:600,color:'#E8E4DD',marginTop:2}},cB[4]),
h('div',{style:{fontSize:10,color:'#555',marginTop:2}},'→ '+pad(cB[2])+':'+pad(cB[3])+(nB?' · poi: '+nB[4]:''))),

h('div',{style:Z.sR},
...[{v:dC+'/'+aC,l:'oggi'},{v:wSH+'h',l:'studio'},{v:todayMeals.length+'/4',l:'pasti'},{v:pom+'',l:'🍅'}].map((s,i)=>
h('div',{key:i,style:Z.sB},h('div',{style:Z.sV},s.v),h('div',{style:Z.sL},s.l)))),

// Mood
